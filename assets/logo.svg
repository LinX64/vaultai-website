<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 108 108" role="img" aria-label="VaultAI logo">
  <defs>
    <linearGradient id="vaultaiAccent" x1="102" y1="6" x2="74" y2="34" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#45E0AC"/>
      <stop offset="1" stop-color="#00D4C8"/>
    </linearGradient>
    <clipPath id="vaultaiTile">
      <rect x="6" y="6" width="96" height="96" rx="26"/>
    </clipPath>
  </defs>

  <!-- light app-icon tile, everything clipped to its rounded corners -->
  <g clip-path="url(#vaultaiTile)">
    <rect x="6" y="6" width="96" height="96" fill="#FDFDFD"/>

    <!-- teal -> mint accent corner sliver, top-right; arc follows the tile radius -->
    <path d="M74,6 L102,6 L102,34 A38,38 0 0 0 74,6 Z" fill="url(#vaultaiAccent)"/>

    <!-- graphite donut / quadrant mark, centered on (54,54) -->
    <path fill="#1E2024" d="M25.02,54 A28.98,28.98 0 0 1 54,25.02 L54,40.89 A13.11,13.11 0 0 0 40.89,54 Z"/>
    <path fill="#474B53" d="M54,25.02 L73.32,25.02 A9.66,9.66 0 0 1 82.98,34.68 L82.98,54 L67.11,54 A13.11,13.11 0 0 0 54,40.89 Z"/>
    <path fill="#606672" d="M82.98,54 A28.98,28.98 0 0 1 54,82.98 L54,67.11 A13.11,13.11 0 0 0 67.11,54 Z"/>
    <path fill="#282B31" d="M54,82.98 A28.98,28.98 0 0 1 25.02,54 L40.89,54 A13.11,13.11 0 0 0 54,67.11 Z"/>

    <!-- white center hole keeps the donut crisp down to 30px -->
    <circle cx="54" cy="54" r="13.11" fill="#FDFDFD"/>
  </g>
</svg>
